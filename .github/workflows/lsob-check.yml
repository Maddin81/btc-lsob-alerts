name: LSOB BTC Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: lsob-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # State (state.json + signals.csv) lebt auf dem Daten-Branch "lsob-state",
      # damit main nicht mit "Update LSOB state"-Commits geflutet wird.
      # Fallback: state.json aus main als einmaliger Seed.
      - name: Load state branch
        run: |
          mkdir -p state-data
          if git fetch --depth 1 origin lsob-state 2>/dev/null; then
            git show FETCH_HEAD:state.json > state-data/state.json 2>/dev/null || rm -f state-data/state.json
            git show FETCH_HEAD:signals.csv > state-data/signals.csv 2>/dev/null || rm -f state-data/signals.csv
            git show FETCH_HEAD:market_state.json > state-data/market_state.json 2>/dev/null || rm -f state-data/market_state.json
          fi
          if [ ! -s state-data/state.json ] && [ -f state.json ]; then
            cp state.json state-data/state.json
          fi
          find state-data -type f -exec sha256sum {} + | sort > /tmp/state-before.txt || true

      # Markt-Radar zuerst: haelt Fear & Greed im geteilten State frisch, den der
      # LSOB-Check dann als Sentiment-Konfluenz nutzt. Best effort -- ein Fehler
      # hier darf den LSOB-Check nicht blockieren (drosselt sich selbst stuendlich).
      - name: Run market radar
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_DIR: state-data
        run: python market_check.py || echo "market_check nicht-fatal fehlgeschlagen"

      - name: Run LSOB check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_DIR: state-data
        run: python lsob_check.py

      # Der Branch wird bei jeder Aenderung als einzelner Commit neu geschrieben
      # (force push) -- signals.csv traegt die Historie in sich selbst.
      - name: Push state branch
        run: |
          find state-data -type f -exec sha256sum {} + | sort > /tmp/state-after.txt || true
          if cmp -s /tmp/state-before.txt /tmp/state-after.txt; then
            echo "State unveraendert, kein Push noetig"
            exit 0
          fi
          cd state-data
          git init -q -b lsob-state
          git config user.name "lsob-bot"
          git config user.email "lsob-bot@users.noreply.github.com"
          git add -A
          git commit -q -m "Update LSOB state"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" lsob-state
