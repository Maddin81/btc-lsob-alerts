services:
  camera-nvr:
    build: .
    # Alternativ nach dem ersten Build ein festes Image benennen:
    # image: camera-nvr:latest
    container_name: camera-nvr
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Konfiguration (config.yaml liegt in ./config)
      - ./config:/config
      # Ereignis-Snapshots persistent auf der Synology speichern
      - ./data:/data
    environment:
      # Passwoerter hier ODER in einer .env-Datei setzen (siehe README).
      - CAM1_PASS=${CAM1_PASS:-}
      - CAM2_PASS=${CAM2_PASS:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    # WS-Discovery (Kamerasuche) braucht das Host-Netz, weil es Multicast nutzt.
    # Wenn du keine Auto-Suche brauchst, kannst du network_mode entfernen und
    # stattdessen die ports-Sektion oben verwenden.
    network_mode: host
